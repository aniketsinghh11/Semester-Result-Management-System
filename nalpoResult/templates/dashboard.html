{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nalbari Polytechnic Result Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="{% static 'images/favicon.png' %}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="{% static 'css/dashboard.css' %}" rel="stylesheet" />

    <script>
      let resultVisible = false;

      function loadResult() {
        const resultSection = document.getElementById("result-section");
        const button = document.getElementById("toggleBtn");

        /* HIDE RESULT */

        if (resultVisible) {
          resultSection.style.display = "none";

          button.innerHTML = `
                <i class="fa-solid fa-file-lines"></i>
                Show Result
            `;

          resultVisible = false;

          return;
        }

        /* SHOW RESULT */

        fetch("/get-result/")
          .then((response) => response.json())
          .then((data) => {
            resultSection.style.display = "block";

            button.innerHTML = `
                <i class="fa-solid fa-eye-slash"></i>
                Hide Result
            `;

            let html = `
                <div class="result-card">

                    <div class="d-flex justify-content-between mb-4">

                        <h3 style="color:#4a004a;">
                            Welcome {{ student.stdname }}
                        </h3>

                        <a href="/logout/" class="btn btn-danger">
                            Logout
                        </a>

                    </div>

                    <table class="table table-bordered table-hover">

                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Marks</th>
                                <th>Status</th>
                                <th>GPA</th>
                            </tr>
                        </thead>

                        <tbody>
            `;

            data.subjects.forEach((sub) => {
              html += `
                    <tr>
                        <td>${sub.name}</td>
                        <td>${sub.marks}</td>
                        <td>${sub.status}</td>
                        <td>${sub.gradepoint}</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>

                    </table>

                    <div class="summary">
                        <p><strong>Total Marks:</strong> ${data.total_marks}</p>
                        <p><strong>GPA:</strong> ${data.gpa}</p>
                        <p><strong>Result:</strong> ${data.result}</p>
                    </div>

                    <a href="/download/" class="btn btn-success mt-4">
                        <i class="fa fa-download"></i>
                        Download Result
                    </a>

                </div>
            `;

            document.getElementById("result-content").innerHTML = html;

            resultVisible = true;
          });
      }
    </script>
  </head>

  <body>
    <!-- HEADER IMAGE -->

    <div class="top-banner">
      <img src="{% static 'results/images/header.png' %}" alt="Header" />
    </div>

    <!-- TITLE -->

    <div class="title-bar">
      <h1>3<sup>rd</sup> SEMESTER RESULT</h1>
    </div>

    <!-- SHOW RESULT BUTTON -->

    <button class="show-btn" id="toggleBtn" onclick="loadResult()">
      <i class="fa-solid fa-file-lines"></i>
      Show Result
    </button>

    <!-- RESULT SECTION -->

    <section id="result-section">
      <div id="result-content"></div>
    </section>

    <!-- FOOTER -->

    <footer>
      <div class="row">
        <div class="col-md-4">
          <h4>Nalbari Polytechnic</h4>

          <p>Chandkuchi, Nalbari, Assam-781334</p>

          <p>Contact: 03624295760</p>

          <p>Email: nalbaripolytechnic@gmail.com</p>

          <div>
            <i class="fab fa-facebook"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-linkedin"></i>
          </div>
        </div>

        <div class="col-md-4">
          <h4>Important Link</h4>

          <p>MOU</p>
          <p>NBA</p>
          <p>ALUMNI</p>
          <p>EXAM CELL</p>
        </div>

        <div class="col-md-4">
          <h4>Useful Link</h4>

          <p>AICTE</p>
          <p>DTE Assam</p>
          <p>DHE Assam</p>
          <p>Scholarship</p>
        </div>
      </div>
    </footer>
  </body>
</html>
