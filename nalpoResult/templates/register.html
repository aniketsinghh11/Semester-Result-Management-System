<!doctype html>
{% load static %}

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Result System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="{% static 'images/favicon.png' %}"
    />
    <link rel="stylesheet" href="{% static 'css/register.css' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ================= HEADER ================= -->

    <div class="top-banner">
      <img src="{% static 'results/images/header.png' %}" alt="Header" />
    </div>

    <!-- ================= BACKGROUND ================= -->

    <div class="background-shape"></div>
    <div class="background-shape2"></div>

    <!-- ================= MAIN ================= -->

    <div class="main-wrapper">
      <div class="register-card">
        <!-- LEFT -->

        <div class="register-left">
          <div class="logo-circle">
            <i class="bi bi-mortarboard-fill"></i>
          </div>

          <h1>
            Student<br />
            Registration
          </h1>

          <p>
            Create your account to access results, academic records and student
            dashboard.
          </p>
        </div>

        <!-- RIGHT -->

        <div class="register-right">
          <h2 class="register-title">Create Account</h2>

          <p class="register-subtitle">Fill all details carefully</p>

          <form method="POST">
            {% csrf_token %}

            <div class="row">
              <div class="col-md-6">
                <div class="input-box">
                  <i class="bi bi-person-fill"></i>

                  <input
                    type="text"
                    name="stdname"
                    class="form-control"
                    placeholder="Full Name"
                    required
                  />
                </div>
              </div>

              <div class="col-md-6">
                <div class="input-box">
                  <i class="bi bi-123"></i>

                  <input
                    type="text"
                    name="roll"
                    class="form-control"
                    placeholder="Roll Number"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="input-box">
              <i class="bi bi-person-badge-fill"></i>

              <input
                type="text"
                name="enroll"
                class="form-control"
                placeholder="Enrollment Number"
                required
              />
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="input-box">
                  <select name="department" class="form-select" required>
                    <option value="">Select Department</option>

                    <option value="1">Computer Science</option>

                    <option value="2">Electrical</option>

                    <option value="3">Printing</option>
                  </select>
                </div>
              </div>

              <div class="col-md-6">
                <div class="input-box">
                  <i class="bi bi-journal-bookmark-fill"></i>

                  <input
                    type="number"
                    name="semester"
                    class="form-control"
                    placeholder="Semester"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="input-box">
              <i class="bi bi-envelope-fill"></i>

              <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Email Address"
                required
              />
            </div>

            <div class="input-box">
              <i class="bi bi-lock-fill"></i>

              <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required
              />
            </div>

            <button type="submit" class="btn btn-register w-100">
              <i class="bi bi-person-plus-fill"></i>
              Register
            </button>
          </form>

          <div class="login-link">
            Already have an account?
            <a href="{% url 'login' %}"> Login </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ================= FOOTER ================= -->

    <div class="footer">© 2026 Nalbari Polytechnic</div>
  </body>
</html>
